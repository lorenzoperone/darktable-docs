site_name: "Guida al post-processing con darktable"
site_description: "Guida operativa al flusso di lavoro scene-referred in darktable"
site_author: "Lorenzo Perone"
site_url: "https://lorenzoperone.github.io/darktable-docs/"
repo_url: "https://github.com/lorenzoperone/darktable-docs"
repo_name: "lorenzoperone/darktable-docs"

docs_dir: docs
site_dir: site

hooks:
  - hooks/content_date.py

theme:
  name: material
  language: it
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Modalità scura
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Modalità chiara
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    logo: material/camera-enhance

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lorenzoperone/darktable-docs

plugins:
  - search:
      lang: it
  - awesome-pages
  - tags
  - git-revision-date-localized:
      locale: it
      type: date
      fallback_to_build_date: true
  - glightbox:
      touchNavigation: true
      loop: false
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

