{% extends "base.html" %}

{% block content %}
  {{ super() }}

  <hr>
  <div class="report-issue">
    <a class="report-issue__btn" href="#" id="report-issue-link" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
        <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path>
        <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"></path>
      </svg>
      Segnala una modifica
    </a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var title = document.title.replace(" — Guida al post-processing con darktable", "").trim();
      var url = window.location.href;
      var body = "### Pagina\n" + title + "\n\n" +
                 "### URL\n" + url + "\n\n" +
                 "### Descrizione della modifica\n" +
                 "<!-- Descrivi cosa andrebbe corretto o migliorato in questa pagina -->\n\n";
      var link = document.getElementById("report-issue-link");
      if (link) {
        link.href = "https://github.com/lorenzoperone/darktable-docs/issues/new" +
                    "?title=" + encodeURIComponent("Modifica: " + title) +
                    "&body=" + encodeURIComponent(body);
      }
    });
  </script>
{% endblock %}
